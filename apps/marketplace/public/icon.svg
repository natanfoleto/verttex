<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-mkt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#064e3b" />
      <stop offset="100%" stop-color="#022c22" />
    </linearGradient>
    <linearGradient id="v-grad-mkt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    <linearGradient id="stroke-grad-mkt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#059669" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow-mkt" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Card -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad-mkt)" stroke="url(#stroke-grad-mkt)" stroke-width="12" />

  <!-- Shopping Handle Accent -->
  <path d="M 176 176 C 176 112 336 112 336 176" fill="none" stroke="#34d399" stroke-width="16" stroke-linecap="round" opacity="0.85" />

  <!-- Glowing Marketplace V Emblem -->
  <g filter="url(#glow-mkt)">
    <path d="M 144 184 L 216 184 L 256 328 L 296 184 L 368 184 L 272 400 C 264 414 248 414 240 400 Z" fill="url(#v-grad-mkt)" />
  </g>

  <!-- Sparkle Marketplace Star Accent -->
  <path d="M 376 120 L 384 138 L 402 146 L 384 154 L 376 172 L 368 154 L 350 146 L 368 138 Z" fill="#6ee7b7" />
</svg>
