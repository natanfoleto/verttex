<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-mgr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <linearGradient id="v-grad-mgr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="stroke-grad-mgr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#047857" stop-opacity="0.3" />
    </linearGradient>
    <filter id="glow-mgr" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Base Card -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg-grad-mgr)" stroke="url(#stroke-grad-mgr)" stroke-width="12" />

  <!-- Shield / Admin Geometry Backing -->
  <path d="M 256 96 L 368 136 V 232 C 368 312 256 376 256 376 C 256 376 144 312 144 232 V 136 Z" fill="none" stroke="#10b981" stroke-width="8" stroke-opacity="0.25" />

  <!-- Glowing V Emblem -->
  <g filter="url(#glow-mgr)">
    <path d="M 144 152 L 216 152 L 256 312 L 296 152 L 368 152 L 272 384 C 264 398 248 398 240 384 Z" fill="url(#v-grad-mgr)" />
  </g>

  <!-- Admin Indicator Badge -->
  <circle cx="376" cy="136" r="24" fill="#10b981" />
  <circle cx="376" cy="136" r="12" fill="#09090b" />
  <circle cx="376" cy="136" r="6" fill="#34d399" />
</svg>
