services:
  postgres:
    image: postgres:16-alpine
    container_name: verttex-postgres
    restart: always
    environment:
      POSTGRES_USER: verttex
      POSTGRES_PASSWORD: verttex_dev_password
      POSTGRES_DB: verttex_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
