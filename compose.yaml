services:
  postgres:
    image: postgres:16-alpine
    container_name: verttex-postgres
    restart: always
    environment:
      POSTGRES_USER: verttex
      POSTGRES_PASSWORD: verttex_dev_password
      POSTGRES_DB: verttex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: verttex-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
